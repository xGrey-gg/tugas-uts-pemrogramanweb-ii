<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Mahasiswa Baru</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 20px;
        }

        .container {
            width: 95%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table,
        th,
        td {
            border: 1px solid black;
        }

        th,
        td {
            padding: 10px;
            text-align: center;
        }

        .form-table td {
            border: none;
            text-align: left;
        }

        input,
        textarea {
            padding: 8px;
            width: 90%;
        }

        button {
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            color: white;
        }

        .btn-simpan {
            background: blue;
        }

        .btn-reset {
            background: red;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>INPUT PENDAFTARAN</h2>

        <form id="formPendaftaran">

            <table class="form-table">

                <tr>
                    <td>JUMLAH INPUT DATA</td>
                    <td><input type="number" id="jumlah" required></td>
                </tr>

                <tr>
                    <td>KODE PENDAFTARAN</td>
                    <td><input type="text" id="kode" required></td>
                </tr>

                <tr>
                    <td>NAMA PENDAFTAR</td>
                    <td><input type="text" id="nama" required></td>
                </tr>

                <tr>
                    <td>JENIS KELAMIN</td>
                    <td>
                        <input type="radio" name="jk" value="Laki-laki" required> Laki-laki
                        <input type="radio" name="jk" value="Perempuan"> Perempuan
                    </td>
                </tr>

                <tr>
                    <td>TTL</td>
                    <td>
                        <input type="text" id="tempat" placeholder="Tempat Lahir" required>
                        <input type="date" id="tanggal" required>
                    </td>
                </tr>

                <tr>
                    <td>ASAL SEKOLAH</td>
                    <td><input type="text" id="sekolah"></td>
                </tr>

                <tr>
                    <td>PEKERJAAN ORTU</td>
                    <td><textarea id="ortu"></textarea></td>
                </tr>

                <tr>
                    <td>MATEMATIKA</td>
                    <td><input type="number" id="mat" required></td>
                </tr>

                <tr>
                    <td>BHS. INGGRIS</td>
                    <td><input type="number" id="inggris" required></td>
                </tr>

                <tr>
                    <td>P. UMUM</td>
                    <td><input type="number" id="umum" required></td>
                </tr>

                <tr>
                    <td></td>
                    <td>
                        <button type="submit" class="btn-simpan">SIMPAN</button>
                        <button type="reset" class="btn-reset">RESET</button>
                    </td>
                </tr>

            </table>

        </form>

        <h2>TABEL DATA</h2>

        <table id="tabelData">

            <thead>
                <tr>
                    <th>Kode</th>
                    <th>Nama</th>
                    <th>Tempat Lahir</th>
                    <th>JK</th>
                    <th>Tgl Lahir</th>
                    <th>Pek. Ortu</th>
                    <th>Tempat Tes</th>
                    <th>Bln Tes</th>
                    <th>MAT</th>
                    <th>ING</th>
                    <th>UMUM</th>
                    <th>Rata-rata</th>
                    <th>Keterangan</th>
                </tr>
            </thead>

            <tbody id="hasilData"></tbody>

        </table>

    </div>

    <script>

        document.getElementById("formPendaftaran").addEventListener("submit", function (e) {

            e.preventDefault();

            let jumlah = document.getElementById("jumlah").value;
            let kode = document.getElementById("kode").value;
            let nama = document.getElementById("nama").value;
            let tempat = document.getElementById("tempat").value;
            let tanggal = document.getElementById("tanggal").value;
            let ortu = document.getElementById("ortu").value;

            let mat = parseFloat(document.getElementById("mat").value);
            let inggris = parseFloat(document.getElementById("inggris").value);
            let umum = parseFloat(document.getElementById("umum").value);

            let jk = document.querySelector('input[name="jk"]:checked').value;

            let rata = (mat + inggris + umum) / 3;

            let keterangan = "";

            if (rata >= 70) {
                keterangan = "LULUS";
            } else if (rata >= 60) {
                keterangan = "CADANGAN";
            } else {
                keterangan = "TIDAK LULUS";
            }

            let awal = kode.charAt(0).toUpperCase();

            let tempatTes = "";

            if (awal === "A") {
                tempatTes = "Gedung A";
            } else if (awal === "B") {
                tempatTes = "Gedung B";
            } else if (awal === "V") {
                tempatTes = "Viktor";
            } else {
                tempatTes = "Tidak Diketahui";
            }

            let bulanTes = kode.slice(-1);

            let row = `
                <tr>
                    <td>${kode}</td>
                    <td>${nama}</td>
                    <td>${tempat}</td>
                    <td>${jk}</td>
                    <td>${tanggal}</td>
                    <td>${ortu}</td>
                    <td>${tempatTes}</td>
                    <td>${bulanTes}</td>
                    <td>${mat}</td>
                    <td>${inggris}</td>
                    <td>${umum}</td>
                    <td>${rata.toFixed(2)}</td>
                    <td>${keterangan}</td>
                </tr>
            `;

            document.getElementById("hasilData").innerHTML = row;

        });

    </script>

</body>

</html>
